name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            dist_cmd: npx electron-builder --win --x64 --publish never
            pack_asar: true
            artifacts: dist/Scalpel-Setup.exe
            artifact_name: release-Windows
          - os: ubuntu-latest
            dist_cmd: npx electron-builder --linux --x64 --publish never
            pack_asar: false
            artifacts: |
              dist/Scalpel-*-linux.AppImage
              dist/Scalpel-*-linux.deb
            artifact_name: release-Linux
          - os: macos-latest
            dist_cmd: npx electron-builder --mac --arm64 --publish never
            pack_asar: false
            artifacts: dist/Scalpel-*-mac.dmg
            artifact_name: release-macOS
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Python setuptools (needed by node-gyp)
        if: runner.os == 'Windows'
        run: pip install setuptools

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Pack ASAR
        if: matrix.pack_asar
        run: node scripts/pack-asar.js

      - name: Build installer
        run: ${{ matrix.dist_cmd }}

      - name: Extract version
        id: version
        shell: bash
        run: echo "version=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifacts }}
            ${{ matrix.pack_asar && format('dist/v{0}/app.asar', steps.version.outputs.version) || '' }}
            ${{ matrix.pack_asar && format('dist/v{0}/app.asar.unpacked.zip', steps.version.outputs.version) || '' }}
            ${{ matrix.pack_asar && format('dist/v{0}/manifest.json', steps.version.outputs.version) || '' }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
